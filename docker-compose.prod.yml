version: '3.8'

services:
  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: visualmodel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - visualmodel_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # FastAPI 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: visualmodel-api:latest
    container_name: visualmodel_api
    ports:
      - "9096:9096"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_BROKER=0
      - REDIS_DB_BACKEND=1
      - REDIS_DB=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src/model_ckpt:/app/src/model_ckpt:ro
      - ./src/vit-base-patch16-224:/app/src/vit-base-patch16-224:ro
      - ./app:/app/app:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9096/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - visualmodel_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: visualmodel-api:latest
    container_name: visualmodel_celery_worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_BROKER=0
      - REDIS_DB_BACKEND=1
      - REDIS_DB=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src/model_ckpt:/app/src/model_ckpt:ro
      - ./src/vit-base-patch16-224:/app/src/vit-base-patch16-224:ro
      - ./app:/app/app:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 --prefetch-multiplier=1
    restart: unless-stopped
    networks:
      - visualmodel_network

  # Celery Flower (监控面板)
  flower:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: visualmodel-api:latest
    container_name: visualmodel_flower
    ports:
      - "5555:5555"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_BROKER=0
      - REDIS_DB_BACKEND=1
    depends_on:
      - redis
      - celery_worker
    command: celery -A app.core.celery_app flower --port=5555 --broker=redis://redis:6379/0
    restart: unless-stopped
    networks:
      - visualmodel_network

volumes:
  redis_data:
    driver: local

networks:
  visualmodel_network:
    driver: bridge
