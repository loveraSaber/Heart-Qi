version: '3.8'

services:
  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: visualmodel_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - visualmodel_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # FastAPI 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visualmodel_api
    ports:
      - "9097:9096"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_BROKER=0
      - REDIS_DB_BACKEND=1
      - REDIS_DB=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src/model_ckpt:/app/src/model_ckpt:ro
      - ./src:/app/src:ro
      - ./src/vit-base-patch16-224:/app/src/vit-base-patch16-224:ro
      - ./src/feat_model_ckpt/feat/feat_detectors:/usr/local/lib/python3.10/site-packages/feat
      - ./app:/app/app:ro
      - ~/.cache/torch:/root/.cache/torch
      - /home/testenv/project/data:/app/data:ro
      - /home/testenv/project/output:/app/output
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9096/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - visualmodel_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visualmodel_celery_worker
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_BROKER=0
      - REDIS_DB_BACKEND=1
      - REDIS_DB=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src/model_ckpt:/app/src/model_ckpt:ro
      - ./src:/app/src:ro
      - ./src/vit-base-patch16-224:/app/src/vit-base-patch16-224:ro
      - ./src/feat_model_ckpt/feat/feat_detectors:/usr/local/lib/python3.10/site-packages/feat
      - ./app:/app/app:ro
      - ~/.cache/torch:/root/.cache/torch
      - /home/testenv/project/data:/app/data:ro
      - /home/testenv/project/output:/app/output
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--prefetch-multiplier=1"]
    restart: unless-stopped
    networks:
      - visualmodel_network

  # Celery Flower 监控面板
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visualmodel_flower
    ports:
      - "5555:5555"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_BROKER=0
      - REDIS_DB_BACKEND=1
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    command: ["celery", "-A", "app.core.celery_app", "flower", "--port=5555", "--broker=redis://${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB_BROKER}"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    networks:
      - visualmodel_network

volumes:
  redis_data:

networks:
  visualmodel_network:
    driver: bridge